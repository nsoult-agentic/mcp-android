name: Build mcp-android

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "Dockerfile"
      - "tsconfig.json"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mcp-android:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/mcp-android:latest
